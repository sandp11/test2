name: PR Changelog Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  comment-changelog:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process changelog and comment
        uses: actions/github-script@v7
        env:
          BASE_REF: ${{ github.base_ref }}
        with:
          script: |
            const fs = require('fs');
            const { spawnSync } = require('child_process');
            const path = '.release/map.json';

            function assertSafeGitRefSegment(name) {
              if (typeof name !== 'string' || name.length === 0 || name.length > 255) {
                throw new Error('Invalid base ref');
              }
              if (name.includes('..') || name.includes('\0') || name.includes('\n')) {
                throw new Error('Invalid base ref');
              }
              if (!/^[a-zA-Z0-9/._-]+$/.test(name)) {
                throw new Error('Invalid base ref');
              }
              return name;
            }

            const baseRef = assertSafeGitRefSegment(process.env.BASE_REF || 'main');

            let hasChanges = false;
            try {
              const diff = spawnSync(
                'git',
                ['diff', '--name-only', `origin/${baseRef}...HEAD`],
                { encoding: 'utf8' }
              );
              if (diff.error) throw diff.error;
              if (diff.status !== 0) throw new Error(diff.stderr || `git diff exited ${diff.status}`);
              const changedFiles = diff.stdout || '';
              hasChanges = changedFiles.split('\n').includes('.release/map.json');
            } catch (error) {
              console.log('Error checking for file changes:', error.message);
              hasChanges = fs.existsSync(path);
            }
            
            if (!hasChanges) {
              console.log('map.json not changed in this PR, skipping comment');
              return;
            }
            
            if (!fs.existsSync(path)) {
              console.log('map.json not found, skipping comment');
              return;
            }
            
            try {
              console.log('DEBUG: Starting package comparison for PR comment');
            
              let baseMap = {};
              try {
                const show = spawnSync(
                  'git',
                  ['show', `origin/${baseRef}:.release/map.json`],
                  { encoding: 'utf8' }
                );
                if (show.error) throw show.error;
                if (show.status !== 0) throw new Error(show.stderr || `git show exited ${show.status}`);
                const baseMapContent = show.stdout || '';
                baseMap = JSON.parse(baseMapContent);
                console.log('Base map contains ' + Object.keys(baseMap).length + ' packages');
              } catch (error) {
                console.log('Base map.json not found, treating as empty');
                baseMap = {};
              }
            
              const currentMapContent = fs.readFileSync(path, 'utf8');
              const currentMap = JSON.parse(currentMapContent);
              console.log('Current map contains ' + Object.keys(currentMap).length + ' packages');
            
              function deepEqual(obj1, obj2) {
                return JSON.stringify(obj1) === JSON.stringify(obj2);
              }
            
              function freezeDeltaLine(baseInfo, currentInfo) {
                const b = baseInfo && typeof baseInfo.frozen === 'boolean' ? baseInfo.frozen : null;
                const c = currentInfo && typeof currentInfo.frozen === 'boolean' ? currentInfo.frozen : null;
                if (b === null || c === null) return null;
                if (b === c) return null;
                return '**Freeze state:** ' + (b ? 'frozen' : 'unfrozen') + ' → ' + (c ? 'frozen' : 'unfrozen');
              }
            
              const changedPackages = [];
            
              for (const [name, currentInfo] of Object.entries(currentMap)) {
                const baseInfo = baseMap[name];
            
                if (!baseInfo) {
                  console.log('Package ' + name + ' is NEW');
                  changedPackages.push({
                    name,
                    status: 'NEW',
                    changelog: currentInfo.changeLog || 'No changelog provided',
                    bumpType: currentInfo.bumpType || 'N/A',
                    baseVersion: 'N/A',
                    newVersion: currentInfo.newVersion || currentInfo.baseVersion || 'N/A',
                    frozen: typeof currentInfo.frozen === 'boolean' ? currentInfo.frozen : null,
                  });
                } else if (!deepEqual(baseInfo, currentInfo)) {
                  console.log('Package ' + name + ' has CHANGES');
                  changedPackages.push({
                    name,
                    status: 'MODIFIED',
                    changelog: currentInfo.changeLog || 'No changelog provided',
                    bumpType: currentInfo.bumpType || 'N/A',
                    baseVersion: baseInfo.newVersion || baseInfo.baseVersion || 'N/A',
                    newVersion: currentInfo.newVersion || currentInfo.baseVersion || 'N/A',
                    frozen: typeof currentInfo.frozen === 'boolean' ? currentInfo.frozen : null,
                    frozenBefore: typeof baseInfo.frozen === 'boolean' ? baseInfo.frozen : null,
                    freezeDelta: freezeDeltaLine(baseInfo, currentInfo),
                  });
                }
              }
            
              for (const name of Object.keys(baseMap)) {
                if (!currentMap[name]) {
                  console.log('Package ' + name + ' was REMOVED');
                  changedPackages.push({
                    name,
                    status: 'REMOVED',
                    changelog: 'Package removed from release map',
                    bumpType: 'N/A',
                    baseVersion: baseMap[name].newVersion || baseMap[name].baseVersion || 'N/A',
                    newVersion: 'N/A',
                    frozenBefore: typeof baseMap[name].frozen === 'boolean' ? baseMap[name].frozen : null,
                  });
                }
              }
            
              if (changedPackages.length === 0) {
                console.log('No packages with actual changes found');
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                });
                const botComment = comments.find(comment =>
                  comment.user.type === 'Bot' &&
                  comment.body.includes('📦 Package Changes')
                );
                if (botComment) {
                  const noChangesBody =
                    '## 📦 Package Changes\n\n' +
                    '**No packages have substantive changes** — `.release/map.json` was touched but entries match the base branch for diff purposes.\n\n' +
                    '---\n*Auto-generated from `.release/map.json`*';
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: botComment.id,
                    body: noChangesBody,
                  });
                  console.log('Updated existing comment to show no changes');
                }
                return;
              }
            
              let commentBody = '## 📦 Package Changes\n\n';
              commentBody += 'Found **' + changedPackages.length + '** package(s) with changes:\n\n';
            
              const newPackages = changedPackages.filter(pkg => pkg.status === 'NEW');
              const modifiedPackages = changedPackages.filter(pkg => pkg.status === 'MODIFIED');
              const removedPackages = changedPackages.filter(pkg => pkg.status === 'REMOVED');
            
              if (newPackages.length > 0) {
                commentBody += '### New packages (' + newPackages.length + ')\n\n';
                newPackages.forEach(pkg => {
                  commentBody += '#### `' + pkg.name + '`\n';
                  commentBody += '- **Bump type:** ' + pkg.bumpType + '\n';
                  commentBody += '- **Version:** ' + pkg.newVersion + '\n';
                  if (pkg.frozen !== null) {
                    commentBody += '- **Frozen:** ' + (pkg.frozen ? 'yes' : 'no') + '\n';
                  }
                  commentBody += '- **Changelog:** ' + pkg.changelog + '\n\n';
                });
              }
            
              if (modifiedPackages.length > 0) {
                commentBody += '### Modified packages (' + modifiedPackages.length + ')\n\n';
                modifiedPackages.forEach(pkg => {
                  commentBody += '#### `' + pkg.name + '`\n';
                  commentBody += '- **Bump type:** ' + pkg.bumpType + '\n';
                  if (pkg.baseVersion !== 'N/A' && pkg.newVersion !== 'N/A' && pkg.baseVersion !== pkg.newVersion) {
                    commentBody += '- **Version:** ' + pkg.baseVersion + ' → ' + pkg.newVersion + '\n';
                  } else if (pkg.newVersion !== 'N/A') {
                    commentBody += '- **Version:** ' + pkg.newVersion + '\n';
                  }
                  if (pkg.freezeDelta) {
                    commentBody += '- ' + pkg.freezeDelta + '\n';
                  } else if (pkg.frozenBefore !== null && pkg.frozen !== null) {
                    commentBody += '- **Frozen:** ' + (pkg.frozenBefore ? 'yes' : 'no') + ' → ' + (pkg.frozen ? 'yes' : 'no') + '\n';
                  }
                  commentBody += '- **Changelog:** ' + pkg.changelog + '\n\n';
                });
              }
            
              if (removedPackages.length > 0) {
                commentBody += '### Removed packages (' + removedPackages.length + ')\n\n';
                removedPackages.forEach(pkg => {
                  commentBody += '#### `' + pkg.name + '`\n';
                  commentBody += '- **Previous version:** ' + pkg.baseVersion + '\n';
                  if (pkg.frozenBefore !== null) {
                    commentBody += '- **Was frozen:** ' + (pkg.frozenBefore ? 'yes' : 'no') + '\n';
                  }
                  commentBody += '- **Status:** removed from release map\n\n';
                });
              }
            
              commentBody += '---\n*Auto-generated from `.release/map.json`*';
            
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
            
              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('📦 Package Changes')
              );
            
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: commentBody,
                });
                console.log('Updated existing changelog comment');
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody,
                });
                console.log('Created new changelog comment');
              }
            } catch (error) {
              console.error('Error processing changelog:', error);
              core.setFailed('Failed to process changelog: ' + (error && error.message ? error.message : String(error)));
            }
